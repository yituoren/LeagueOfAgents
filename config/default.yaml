# League of Agents Default Configuration

llm:
  model: "gpt-4o-mini"
  base_url: null # Custom API address (e.g., DeepSeek or other compatible interfaces)
  temperature: 0.7
  max_tokens: 2048

game:
  name: "draw_and_guess"
  num_rounds: 4 # Number of rounds (defaults to each player being the drawer once)
  max_steps_per_round: 10
  timeout_seconds: 30.0

players:
  - name: "Alice"
  - name: "Bob"
  - name: "Charlie"
  - name: "Diana"

draw_and_guess:
  word_pool:
    - "Apple"
    - "Sun"
    - "Moon"
    - "Cat"
    - "Airplane"
    - "Snowflake"
    - "Guitar"
    - "Castle"
    - "Rainbow"
    - "Robot"
    - "Volcano"
    - "Diamond"
    - "Butterfly"
    - "Telescope"
    - "Lighthouse"

logging:
  level: "INFO"
  output_dir: "logs"
