# League of Agents Default Configuration

# Global LLM config (used as default for all players)
llm:
  model: "gemini-2.5-flash-lite"
  base_url: "https://generativelanguage.googleapis.com/v1beta/openai/"
  # api_key loaded from .env (LLM_API_KEY)
  temperature: 0.7
  max_tokens: 2048

game:
  name: "draw_and_guess"
  num_rounds: 2
  max_steps_per_round: 10
  timeout_seconds: 60.0

# Each player can override global llm config with its own llm section
players:
  - name: "Alice"
  - name: "Bob"
  - name: "Charlie"

# Tool configurations (image_generation disabled for now — no endpoint available)
tools: {}

# Game-specific settings
draw_and_guess:
  word_pool:
    - "Apple"
    - "Sun"
    - "Moon"
    - "Cat"
    - "Guitar"
    - "Castle"
    - "Rainbow"
    - "Robot"
    - "Butterfly"
    - "Lighthouse"

logging:
  level: "INFO"
  output_dir: "logs"
