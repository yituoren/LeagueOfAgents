# League of Agents 默认配置

llm:
  model: "gpt-4o-mini"
  base_url: null          # 自定义API地址（如DeepSeek等兼容接口）
  temperature: 0.7
  max_tokens: 2048

game:
  name: "draw_and_guess"
  num_rounds: 4           # 游戏轮数（默认每人当一次作画者）
  max_steps_per_round: 10
  timeout_seconds: 30.0

players:
  - name: "Alice"
  - name: "Bob"
  - name: "Charlie"
  - name: "Diana"

draw_and_guess:
  word_pool:
    - "苹果"
    - "太阳"
    - "月亮"
    - "猫"
    - "飞机"
    - "雪花"
    - "吉他"
    - "城堡"
    - "彩虹"
    - "机器人"
    - "火山"
    - "钻石"
    - "蝴蝶"
    - "望远镜"
    - "灯塔"

logging:
  level: "INFO"
  output_dir: "logs"
