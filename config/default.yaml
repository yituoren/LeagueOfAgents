# League of Agents Default Configuration
# Top level: llm, game, logging

# Global LLM config (default for all players and referee)
llm:
  model: "gemini-2.5-pro"
  base_url: "https://generativelanguage.googleapis.com/v1beta/openai/"
  # api_key loaded from .env (LLM_API_KEY)
  temperature: 0.7
  max_tokens: 2048

# Game configuration — everything game-specific lives here
game:
  target: "games.draw_and_guess" # module path → auto-resolves GameEngine
  num_rounds: 4
  max_steps_per_round: 10
  timeout_seconds: 60.0

  players:
    - name: "Alice"
    - name: "Bob"
    - name: "Charlie"
      llm:
        model: "gemini-3.1-flash-lite-preview"
    - name: "Diana"
      llm:
        model: "gemini-3.1-flash-lite-preview"
    # Per-player LLM override example:
    # - name: "Diana"
    #   llm:
    #     model: "gpt-4o-mini"
    #     base_url: null

  tools:
    - target: "games.draw_and_guess.tools:ImageGenerationTool"
      params:
        model: "imagen-4.0-fast-generate-001"
        base_url: "https://generativelanguage.googleapis.com/"
        # api_key resolved from: params > IMAGE_GEN_API_KEY > LLM_API_KEY

  referee:
    target: "games.draw_and_guess.referee:DrawAndGuessReferee"
    llm:
      temperature: 1.0

logging:
  level: "INFO"
  output_dir: "logs"
